<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <clipPath id="roundedBg">
      <rect width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Calendar drop shadow -->
  <rect x="192" y="232" width="656" height="616" rx="44" fill="rgba(0,0,0,0.18)"/>

  <!-- Calendar body -->
  <rect x="184" y="220" width="656" height="616" rx="44" fill="white"/>

  <!-- Calendar header band -->
  <rect x="184" y="220" width="656" height="140" rx="44" fill="#4f46e5"/>
  <rect x="184" y="316" width="656" height="44" fill="#4f46e5"/>

  <!-- Binding rings -->
  <rect x="336" y="164" width="52" height="116" rx="26" fill="#c7d2fe"/>
  <rect x="648" y="164" width="52" height="116" rx="26" fill="#c7d2fe"/>

  <!-- Header: calendar label lines -->
  <rect x="240" y="256" width="200" height="22" rx="11" fill="rgba(255,255,255,0.65)"/>
  <rect x="240" y="288" width="140" height="16" rx="8" fill="rgba(255,255,255,0.4)"/>

  <!-- Day column headers (Mon–Fri dots) -->
  <rect x="240" y="376" width="100" height="20" rx="10" fill="#e0e7ff"/>
  <rect x="356" y="376" width="100" height="20" rx="10" fill="#e0e7ff"/>
  <rect x="472" y="376" width="100" height="20" rx="10" fill="#e0e7ff"/>
  <rect x="588" y="376" width="100" height="20" rx="10" fill="#e0e7ff"/>
  <rect x="704" y="376" width="116" height="20" rx="10" fill="#e0e7ff"/>

  <!-- Row 1 blocks -->
  <rect x="240" y="412" width="100" height="84" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="4"/>
  <rect x="356" y="412" width="216" height="84" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>
  <rect x="588" y="412" width="232" height="84" rx="12" fill="#f3e8ff" stroke="#a855f7" stroke-width="4"/>

  <!-- Row 2 blocks -->
  <rect x="240" y="512" width="216" height="84" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="4"/>
  <rect x="472" y="512" width="100" height="84" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="4"/>
  <rect x="588" y="512" width="232" height="84" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>

  <!-- Row 3 blocks -->
  <rect x="240" y="612" width="100" height="84" rx="12" fill="#f3e8ff" stroke="#a855f7" stroke-width="4"/>
  <rect x="356" y="612" width="332" height="84" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="4"/>
  <rect x="704" y="612" width="116" height="84" rx="12" fill="#ffedd5" stroke="#f97316" stroke-width="4"/>

  <!-- Row 4 blocks -->
  <rect x="240" y="712" width="332" height="76" rx="12" fill="#cffafe" stroke="#06b6d4" stroke-width="4"/>
  <rect x="588" y="712" width="232" height="76" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="4"/>
</svg>
